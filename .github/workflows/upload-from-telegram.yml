name: Upload File (Telegram to GitHub, HF, Bale & FTP)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram Chat ID'
        required: true
        type: string
      message_id:
        description: 'Telegram Message ID'
        required: true
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: "v1.0.0"
      HF_REPO_ID: "mrk7197/my-storage"
      HF_REPO_TYPE: "model"
      FTP_DIR: "team_backups"
      CHAT_ID: ${{ github.event.inputs.chat_id }}
      MESSAGE_ID: ${{ github.event.inputs.message_id }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Libraries
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyrogram tgcrypto huggingface_hub requests

      - name: Run Transfer Engine
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          cat << 'EOF' > transfer.py
          import os
          import asyncio
          import requests
          from pyrogram import Client
          from pyrogram.errors import RPCError
          
          async def main():
              app = Client("bot", api_id=int(os.environ['TG_API_ID']), 
                           api_hash=os.environ['TG_API_HASH'], 
                           bot_token=os.environ['TG_BOT_TOKEN'])
              async with app:
                  try:
                      # دریافت پیام به صورت لیستی
                      messages = await app.get_messages(int(os.environ['CHAT_ID']), [int(os.environ['MESSAGE_ID'])])
                      msg = messages[0]
                      
                      # شناسایی فایل
                      file_obj = msg.document or msg.photo or msg.video or msg.audio or msg.voice
                      if not file_obj:
                          print("❌ هیچ فایلی در این پیام یافت نشد.")
                          return

                      print(f"📥 شروع دانلود فایل از تلگرام...")
                      file_path = await app.download_media(msg)
                      with open("file_info.txt", "w") as f: f.write(file_path)
                      print(f"✅ فایل دانلود شد: {file_path}")

                  except Exception as e:
                      print(f"❌ خطا در دانلود: {e}")

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 transfer.py

      - name: Upload to GitHub
        run: |
          FILE_PATH=$(cat file_info.txt)
          gh release upload "${{ env.RELEASE_TAG }}" "$FILE_PATH" --repo "${{ env.GH_REPO }}" --clobber || \
          gh release create "${{ env.RELEASE_TAG }}" --repo "${{ env.GH_REPO }}" "$FILE_PATH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
