name: Upload File from Telegram

# این اکشن زمانی اجرا می‌شود که ورکر کلادفلر یک سیگنال (Repository Dispatch) ارسال کند
on:
  repository_dispatch:
    types: [telegram_upload]

# مجوزهای لازم برای نوشتن و آپلود فایل در ریپازیتوری
permissions:
  contents: write

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    steps:
      # ۱. دریافت آخرین کدهای ریپازیتوری شما
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ۲. نصب و راه‌اندازی پایتون روی سرور گیت‌هاب
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ۳. نصب کتابخانه‌های مورد نیاز پایتون
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyrogram tgcrypto huggingface_hub

      # ۴. اجرای اسکریپت پایتون برای دانلود از تلگرام و آپلود به مقصد
      - name: Run Transfer Script
        env:
          # توکن‌ها و سکرت‌های امنیتی که از بخش Settings > Secrets گیت‌هاب خوانده می‌شوند
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # اطلاعاتی که ورکر کلادفلر به عنوان Payload ارسال کرده است
          FILE_ID: ${{ github.event.client_payload.file_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name }}
          FILE_SIZE: ${{ github.event.client_payload.file_size }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          python transfer.py
