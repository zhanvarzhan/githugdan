name: Upload File (Telegram to GitHub & HF)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      message_id:
        description: 'Telegram Message ID'
        required: true

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram tgcrypto huggingface_hub requests nest_asyncio

      - name: Run Transfer Engine
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HF_REPO_ID: "mrk7197/my-storage"
          HF_REPO_TYPE: "model"
          RELEASE_TAG: "v1.0.0"
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MESSAGE_ID: ${{ github.event.inputs.message_id }}
        run: |
          cat << 'EOF' > transfer.py
          import os
          import asyncio
          import requests
          import nest_asyncio
          from huggingface_hub import HfApi

          nest_asyncio.apply()
          from pyrogram import Client
          
          BOT_TOKEN = os.environ['TG_BOT_TOKEN']
          API_ID = int(os.environ['TG_API_ID'])
          API_HASH = os.environ['TG_API_HASH']
          CHAT_ID = int(os.environ['CHAT_ID'])
          MESSAGE_ID = int(os.environ['MESSAGE_ID'])
          
          def extract_file_details(msg):
              for attr in ["document", "video", "audio", "voice", "video_note", "animation", "photo"]:
                  obj = getattr(msg, attr, None)
                  if obj:
                      if attr == "photo":
                          return obj[-1].file_id, "photo.jpg", obj[-1].file_size
                      file_name = getattr(obj, "file_name", f"file_{obj.file_id[:8]}.{attr if attr != 'video' else 'mp4'}")
                      return obj.file_id, file_name, obj.file_size
              return None, None, None
          
          async def main():
              app = Client("bot_session", api_id=API_ID, api_hash=API_HASH, bot_token=BOT_TOKEN, in_memory=True)
              await app.start()
              
              # خواندن مستقیم همان پیامی که فوروارد کرده‌اید
              msg = await app.get_messages(CHAT_ID, MESSAGE_ID)
              file_id, file_name, file_size = extract_file_details(msg)
              
              if not file_id:
                  print("❌ فایل معتبری یافت نشد.")
                  await app.stop()
                  return

              file_size_mb = file_size / (1024 * 1024)
              
              requests.post(f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage", 
                            json={"chat_id": CHAT_ID, "text": f"📥 دانلود مستقیم فایل «{file_name}» ({file_size_mb:.2f} MB) از سرور تلگرام آغاز شد..."})

              file_path = await app.download_media(msg)
              
              # آپلود هاگینگ فیس
              hf_status = "✅ موفق"
              try:
                  hf_api = HfApi()
                  hf_api.upload_file(
                      path_or_fileobj=file_path,
                      path_in_repo=file_name,
                      repo_id=os.environ['HF_REPO_ID'],
                      repo_type=os.environ['HF_REPO_TYPE'],
                      token=os.environ['HF_TOKEN']
                  )
              except Exception as e:
                  hf_status = f"❌ خطا ({str(e)})"
          
              # آپلود گیت‌هاب ریلیز
              gh_status = "✅ موفق"
              gh_token = os.environ['GITHUB_TOKEN']
              gh_repo = os.environ['GH_REPO']
              rel_tag = os.environ['RELEASE_TAG']
              headers = {'Authorization': f'token {gh_token}', 'Accept': 'application/vnd.github.v3+json'}
              
              res = requests.post(f"https://api.github.com/repos/{gh_repo}/releases", json={"tag_name": rel_tag, "name": f"Release {rel_tag}"}, headers=headers)
              if res.status_code == 201:
                  rel_id = res.json()['id']
              else:
                  res_get = requests.get(f"https://api.github.com/repos/{gh_repo}/releases/tags/{rel_tag}", headers=headers)
                  rel_id = res_get.json().get('id')
              
              if rel_id:
                  upload_url = f"https://uploads.github.com/repos/{gh_repo}/releases/{rel_id}/assets?name={file_name}"
                  headers['Content-Type'] = 'application/octet-stream'
                  with open(file_path, 'rb') as f:
                      requests.post(upload_url, headers=headers, data=f)
              else:
                  gh_status = "❌ خطا در ساخت ریلیز"
                  
              await app.stop()
              if os.path.exists(file_path):
                  os.remove(file_path)

              # گزارش نهایی
              report = (
                  f"🏁 فرآیند انتقال با موفقیت انجام شد!\n\n"
                  f"📦 نام فایل: {file_name}\n"
                  f"📊 حجم: {file_size_mb:.2f} MB\n"
                  f"🤗 هاگینگ‌فیس: {hf_status}\n"
                  f"🐙 گیت‌هاب ریلیز: {gh_status}"
              )
              requests.post(f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": report})
          
          if __name__ == '__main__':
              loop = asyncio.get_event_loop()
              loop.run_until_complete(main())
          EOF
          
          python transfer.py
