name: Upload File (Telegram to GitHub & HF)

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # استفاده از یک نسخه پایدار

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram tgcrypto huggingface_hub requests nest_asyncio

      - name: Run Transfer Engine
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HF_REPO_ID: "mrk7197/my-storage" # 🟢 اگر نام مخزن هاگینگ‌فیس شما چیزی غیر از my-storage است، آن را اینجا اصلاح کنید
          HF_REPO_TYPE: "model"
          RELEASE_TAG: "v1.0.0"
        run: |
          cat << 'EOF' > transfer.py
          import os
          import asyncio
          import requests
          import nest_asyncio
          from huggingface_hub import HfApi

          # حل مشکل قفل شدن ناگهانی حلقه‌های آسینک در پایتون‌های جدید
          nest_asyncio.apply()
          
          # دور زدن ارور سیستم داخلی پایروگرام در زمان ایمپورت
          try:
              import uvloop
              asyncio.set_event_loop_policy(uvloop.EventLoopPolicy())
          except ImportError:
              pass
              
          from pyrogram import Client
          
          BOT_TOKEN = os.environ['TG_BOT_TOKEN']
          API_ID = int(os.environ['TG_API_ID'])
          API_HASH = os.environ['TG_API_HASH']
          
          def get_latest_document_info():
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/getUpdates"
              try:
                  res = requests.get(url).json()
                  if not res.get("ok") or not res.get("result"):
                      return None, None
                  for update in reversed(res["result"]):
                      msg = update.get("message", {})
                      if "document" in msg:
                          return msg["chat"]["id"], msg["message_id"]
              except Exception:
                  pass
              return None, None
          
          async def main():
              chat_id, message_id = get_latest_document_info()
              if not chat_id:
                  print("❌ هیچ فایلی در پیام‌های اخیر ربات یافت نشد. (ابتدا فایل را به ربات ارسال کنید)")
                  return
          
              print(f"🔍 فایل جدید در تلگرام شناسایی شد. در حال اتصال به سرورهای تلگرام...")
          
              app = Client("bot_session", api_id=API_ID, api_hash=API_HASH, bot_token=BOT_TOKEN, in_memory=True)
              await app.start()
              
              msg = await app.get_messages(chat_id, message_id)
              file_name = msg.document.file_name
              file_size_mb = msg.document.file_size / (1024 * 1024)
              print(f"📥 در حال دانلود: {file_name} ({file_size_mb:.2f} MB)")
              
              file_path = await app.download_media(msg)
              print("✅ دانلود از تلگرام روی سرور موقت گیت‌هاب کامل شد.")
          
              print("\n⏳ در حال آپلود به هاگینگ‌فیس...")
              hf_api = HfApi()
              try:
                  hf_api.upload_file(
                      path_or_fileobj=file_path,
                      path_in_repo=file_name,
                      repo_id=os.environ['HF_REPO_ID'],
                      repo_type=os.environ['HF_REPO_TYPE'],
                      token=os.environ['HF_TOKEN']
                  )
                  print("✅ آپلود در هاگینگ‌فیس موفق بود.")
              except Exception as e:
                  print(f"❌ خطا در هاگینگ‌فیس: {str(e)}")
          
              print("\n⏳ در حال آپلود به گیت‌هاب...")
              gh_token = os.environ['GITHUB_TOKEN']
              gh_repo = os.environ['GH_REPO']
              rel_tag = os.environ['RELEASE_TAG']
              headers = {'Authorization': f'token {gh_token}', 'Accept': 'application/vnd.github.v3+json'}
              
              rel_data = {"tag_name": rel_tag, "name": f"Release {rel_tag}"}
              res = requests.post(f"https://api.github.com/repos/{gh_repo}/releases", json=rel_data, headers=headers)
              if res.status_code == 201:
                  rel_id = res.json()['id']
              else:
                  res_get = requests.get(f"https://api.github.com/repos/{gh_repo}/releases/tags/{rel_tag}", headers=headers)
                  rel_id = res_get.json().get('id')
              
              if rel_id:
                  upload_url = f"https://uploads.github.com/repos/{gh_repo}/releases/{rel_id}/assets?name={file_name}"
                  headers['Content-Type'] = 'application/octet-stream'
                  with open(file_path, 'rb') as f:
                      up_res = requests.post(upload_url, headers=headers, data=f)
                      
                  if up_res.status_code == 201:
                      print("✅ آپلود در گیت‌هاب موفق بود.")
                  else:
                      print(f"❌ خطا در آپلود گیت‌هاب: {up_res.text}")
              else:
                  print("❌ خطا در پیدا کردن یا ساخت ریلیز گیت‌هاب")
                  
              await app.stop()
              if os.path.exists(file_path):
                  os.remove(file_path)
          
          # راه اندازی ایمن تر لوپ با متد جدید نیتیو
          if __name__ == '__main__':
              try:
                  loop = asyncio.get_event_loop()
              except RuntimeError:
                  loop = asyncio.new_event_loop()
                  asyncio.set_event_loop(loop)
              loop.run_until_complete(main())
          EOF
          
          python transfer.py
