name: Upload File (Smart Router & Links)

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram Chat ID'
        required: true
        type: string
      message_id:
        description: 'Telegram Message ID'
        required: true
        type: string
      destinations:
        description: 'Selected targets (e.g., GH,HF,FTP,BALE)'
        required: true
        default: 'GH,HF,FTP,BALE'

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: "v1.0.0"
      HF_REPO_ID: "mrk7197/my-storage"
      HF_REPO_TYPE: "model"
      FTP_DIR: "team_backups"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Libraries
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyrogram tgcrypto huggingface_hub requests nest_asyncio

      - name: Run Transfer Engine
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MESSAGE_ID: ${{ github.event.inputs.message_id }}
          DESTINATIONS: ${{ github.event.inputs.destinations }}
        run: |
          cat << 'EOF' > transfer.py
          import os
          import asyncio
          import requests
          import nest_asyncio
          import ftplib
          from huggingface_hub import HfApi

          nest_asyncio.apply()
          from pyrogram import Client
          
          BOT_TOKEN = os.environ.get('TG_BOT_TOKEN')
          API_ID = int(os.environ.get('TG_API_ID', 0))
          API_HASH = os.environ.get('TG_API_HASH')
          CHAT_ID = int(os.environ.get('CHAT_ID', 0))
          MESSAGE_ID = int(os.environ.get('MESSAGE_ID', 0))
          BALE_TOKEN = os.environ.get('BALE_BOT_TOKEN')
          BALE_CHAT = os.environ.get('BALE_CHAT_ID')
          DESTINATIONS = os.environ.get('DESTINATIONS', '').split(',')
          
          def extract_file_details(msg):
              for attr in ["document", "video", "audio", "voice", "video_note", "animation", "photo"]:
                  obj = getattr(msg, attr, None)
                  if obj:
                      file_name = getattr(obj, "file_name", f"file_{obj.file_id[:8]}.{attr}")
                      return obj.file_id, file_name, obj.file_size
              return None, None, None

          async def main():
              app = Client("bot_session", api_id=API_ID, api_hash=API_HASH, bot_token=BOT_TOKEN, in_memory=True)
              await app.start()
              
              msg = await app.get_messages(CHAT_ID, MESSAGE_ID)
              file_id, file_name, file_size = extract_file_details(msg)
              
              if not file_id:
                  await app.stop()
                  return

              requests.post(f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": f"📥 در حال پردازش فایل «{file_name}» بر اساس مقاصد انتخابی..."})
              file_path = await app.download_media(msg)
              
              report_text = f"🏁 **گزارش انتقال هوشمند**\n\n📦 نام فایل: `{file_name}`\n"
              
              # 1. FTP Upload
              if 'FTP' in DESTINATIONS:
                  try:
                      ftp = ftplib.FTP(os.environ['FTP_HOST'])
                      ftp.login(os.environ['FTP_USER'], os.environ['FTP_PASS'])
                      ftp.set_pasv(True)
                      if os.environ['FTP_DIR']:
                          try: ftp.cwd(os.environ['FTP_DIR'])
                          except: ftp.mkd(os.environ['FTP_DIR']); ftp.cwd(os.environ['FTP_DIR'])
                      with open(file_path, 'rb') as f:
                          ftp.storbinary(f"STOR {file_name}", f)
                      ftp.quit()
                      # ساخت لینک فرضی بر اساس دامنه (باید آدرس سایت خود را جایگزین کنید)
                      report_text += f"🌐 **هاست:** ✅ موفق\n🔗 لینک: `https://yourdomain.com/{os.environ['FTP_DIR']}/{file_name}`\n\n"
                  except Exception as e:
                      report_text += f"🌐 **هاست:** ❌ خطا\n\n"
              else:
                  report_text += "🌐 **هاست:** ⏭️ نادیده گرفته شد\n\n"

              # 2. Hugging Face Upload
              if 'HF' in DESTINATIONS:
                  try:
                      hf_api = HfApi()
                      hf_api.upload_file(path_or_fileobj=file_path, path_in_repo=file_name, repo_id=os.environ['HF_REPO_ID'], repo_type=os.environ['HF_REPO_TYPE'], token=os.environ['HF_TOKEN'])
                      hf_link = f"https://huggingface.co/{os.environ['HF_REPO_ID']}/resolve/main/{file_name}"
                      report_text += f"🤗 **هاگینگ‌فیس:** ✅ موفق\n🔗 لینک: {hf_link}\n\n"
                  except Exception as e:
                      report_text += f"🤗 **هاگینگ‌فیس:** ❌ خطا\n\n"
              else:
                  report_text += "🤗 **هاگینگ‌فیس:** ⏭️ نادیده گرفته شد\n\n"

              # Save info for GitHub Release step
              with open("file_info.txt", "w") as fi:
                  fi.write(file_path if 'GH' in DESTINATIONS else "SKIP")

              with open("report_info.txt", "w", encoding="utf-8") as ri:
                  ri.write(report_text)

              await app.stop()
          
          if __name__ == '__main__':
              asyncio.get_event_loop().run_until_complete(main())
          EOF
          python3 transfer.py

      - name: Upload to GitHub Release
        id: gh_release
        run: |
          FILE_PATH=$(cat file_info.txt)
          REPORT_TEXT=$(cat report_info.txt)
          FILE_NAME=$(basename "$FILE_PATH")
          
          if [ "$FILE_PATH" != "SKIP" ]; then
            gh release create "${{ env.RELEASE_TAG }}" --repo "${{ env.GH_REPO }}" --title "Release ${{ env.RELEASE_TAG }}" --notes "Automated Cloud Storage Assets" || true
            gh release upload "${{ env.RELEASE_TAG }}" "$FILE_PATH" --repo "${{ env.GH_REPO }}" --clobber
            GH_LINK="https://github.com/${{ env.GH_REPO }}/releases/download/${{ env.RELEASE_TAG }}/$FILE_NAME"
            REPORT_TEXT="$REPORT_TEXT 🐙 **گیت‌هاب:** ✅ موفق\n🔗 لینک: $GH_LINK\n\n"
          else
            REPORT_TEXT="$REPORT_TEXT 🐙 **گیت‌هاب:** ⏭️ نادیده گرفته شد\n\n"
          fi
          echo -e "$REPORT_TEXT" > final_report.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Final Telegram Report
        run: |
          FINAL_MSG=$(cat final_report.txt)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ github.event.inputs.chat_id }}" \
            -d "text=$FINAL_MSG" \
            -d "parse_mode=Markdown"
